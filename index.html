<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phantom Traffic Simulation</title>
  </head>
<body>
<div style="width:100%;max-width:900px;">
  <h1>Phantom Traffic Simulation</h1>
  <div id="wrap">
    <div id="canvasWrap"><canvas id="c"></canvas></div>
    <div id="panel">
      <div class="panel-title">&#x1F697; Traffic control</div>

      <div class="ctrl">
        <div class="ctrl-row"><label>Cars</label><span class="val" id="vCars">12</span></div>
        <input type="range" id="sCars" min="5" max="20" value="12">
      </div>
      <div class="ctrl">
        <div class="ctrl-row"><label>Max speed (m/s)</label><span class="val" id="vSpeed">40</span></div>
        <input type="range" id="sSpeed" min="10" max="50" step="1" value="40">
      </div>
      <div class="ctrl">
        <div class="ctrl-row"><label>Acceleration (m/s^2)</label><span class="val" id="vAcc">5</span></div>
        <input type="range" id="sAcc" min="1" max="10" step="0.1" value="5">
      </div>
      <div class="ctrl">
        <div class="ctrl-row"><label>Slowing Distance (m)</label><span class="val" id="vSlowDist">30</span></div>
        <input type="range" id="sSlowDist" min="20" max="40" step="1" value="30">
      </div>
      <div class="ctrl">
        <div class="ctrl-row"><label>Deceleration</label><span class="val" id="vSlow">5</span></div>
        <input type="range" id="sSlow" min="0" max="10" step="0.1" value="25">
      </div>
      <div class="ctrl">
        <div class="ctrl-row"><label>Brake Force (m/s^2)</label><span class="val" id="vBrake">12</span></div>
        <input type="range" id="sBrake" min="1" max="15" step="1" value="12">
      </div>
      <div class="ctrl">
        <div class="ctrl-row"><label>Safe Distance (m)</label><span class="val" id="vDist">6</span></div>
        <input type="range" id="sDist" min="0" max="10" step="0.1" value="6">
      </div>
      <div class="ctrl">
        <div class="ctrl-row"><label>Reaction Delay (ms)</label><span class="val" id="vDelay">750</span></div>
        <input type="range" id="sDelay" min="1" max="1000" step="1" value="750">
      </div>

      <div class="stats">
        <div class="stat-card"><div class="s-label">Avg speed</div><div class="s-val" id="statAvg">—</div></div>
        <div class="stat-card"><div class="s-label">Slow cars</div><div class="s-val" id="statSlow">—</div></div>
      </div>

      <div class="legend">
        <div class="leg-item"><div class="leg-dot" style="background:#4fc3f7"></div>Moving</div>
        <div class="leg-item"><div class="leg-dot" style="background:#ffa726"></div>Braking</div>
        <div class="leg-item"><div class="leg-dot" style="background:#ef5350"></div>Slow</div>
      </div>
    </div>
  </div>
</div>

<script type="module" src="/src/main.js"></script>
</body>
</html>
